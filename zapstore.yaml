name: NovaBeing
summary: Zachte Human Design tools voor gezinnen.
description: |
  NovaBeing helpt ouders, kinderen en tieners leven op hun eigen ritme met Human Design, zachte tools en bewuste keuzes voor lichaam en geest.

  De Android app opent de NovaBeing memberomgeving in een rustige app-ervaring, met snelle toegang tot persoonlijke inzichten, tools, sessies en content.

  Deze eerste Zap Store release is webapp-first: NovaBeing blijft centraal beheerd via novabeing.me en wordt verpakt als Android app voor eenvoudige installatie via Zap Store.
tags:
  - wellness
  - education
  - family
  - human-design
website: https://novabeing.me
icon: public/icons/novabeing-512.png
release_notes: docs/zapstore-release-notes.md
